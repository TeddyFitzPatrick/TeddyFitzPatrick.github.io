<!DOCTYPE html>
<html lang="en">
<head>
    <!-- npx tailwindcss -i ./style.css -o ./tailwind_style.css --watch -->
    <link href="./twstyle.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teddy's Website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu&display=swap');
        *{
            font-family: 'Ubuntu', sans-serif;
        }
    </style>       
</head>
<!-- Screen -->
<body class="flex flex-col items-start z-[-20] bg-[#001220] w-full h-[200vh]">

    <!-- Navigation Bar -->
    <nav class="absolute flex flex-row items-center list-none bg-white text-black
     text-lg lg:text-2xl font-bold gap-8 justify-end h-[5vh] w-full bg-none p-8">
        <a><li class="nav_icon">Github</li></a>
        <a><li class="nav_icon">Projects</li></a>
        <a><li class="nav_icon">Contact</li></a>
    </nav>

    <!-- First Section -->
    <section class="flex flex-col gap-8 items-center justify-center text-center
     w-full h-[65vh]">
        <h1 class="text-white text-4xl md:text-6xl font-bold w-fit h-fit">Teddy's Website</h1>
        <p class="text-white text-xl md:text-3xl font-bold w-fit h-fit">Where creativity meets innovation</p>
    </section>

    
    <!-- Put the thing here -->
    <svg>
        <img src="images/waves.svg" alt="waves" class="bg-cover bg-no-repeat w-full"/>
    </svg>

    <!-- Second Section -->
    <section class="w-full h-screen bg-[#FA7268]">
    </section>

</body>
</html>
