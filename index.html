<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- npx tailwindcss -i ./style.css -o ./tailwind_style.css --watch -->
    <link href="./twstyle.css" rel="stylesheet" />
    <script src="pagescript.js"></script>
    <style>
    @import url("https://fonts.googleapis.com/css2?family=Ubuntu&display=swap");
      * {font-family: "Ubuntu", sans-serif;}
    </style>

    <script src="https://cdn.jsdelivr.net/npm/kute.js@2.2.0/dist/kute.min.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teddy's Website</title>
  </head>

  <!-- Screen -->
  <body class="absolute z-[-40] m-0 flex flex-col items-start bg-mod-gray w-full h-[200vh]">


    <!-- Navigation Bar -->
    <nav id="navigation" style="visibility: visible;" 
      class="relative flex flex-row items-center text-black text-lg 
      lg:text-2xl font-bold gap-2 justify-end h-[12.5vh] w-full bg-none
      flex-none left-0">
      <!-- Nav Buttons  -->
      <a href="index.html" class="nav_icon relative left-0 ml-4">Home</a>
      <a href="https://github.com/TeddyFitzPatrick" target="_blank" class="nav_icon">Github</a>
      <a href="projects.html" class="nav_icon">Projects</a>
      <a href="#" class="nav_icon mr-4">Contact</a>
      <!-- Pop Up Navbar Button  -->
      <div class="absolute flex justify-center w-full h-[12.5vh]">
        <!-- Button  -->
        <button onclick="nav_menu()" id="popup_button" class="z-10 border-4 
        hover:border-mod-orange hover:bg-mod-pink
         absolute flex justify-center items-center w-20 h-20  rounded-full mt-[12.5vh]">
         <!-- Arrow   -->
         <img src="images/arrow.svg" alt="arrow" id="arrow" class="select-none rotate-180 w-1/2 h-auto"/>
        </button>
      </div>
    </nav>



    <!-- First Section -->
    <section class="relative flex flex-col items-center justify-center text-center w-full h-[70vh] text-mod-orange">
      <div class="relative mt-[17vh] w-fit h-fit flex justify-center items-center text-center flex-col gap-8">
        <!-- SVG Morphing Anim Background  -->
        <div class="absolute h-fit z-[-10]">
          <svg class="max-w-[90vw] w-auto h-fit" id="visual" viewBox="0 0 900 600" width="900" height="600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1">
            <!-- SVG (Blob) One -->
            <g transform="translate(471.1621029854186 348.678578396812)">
              <path id="blob1" d="M154.3 -174C184.6 -124 183.3 -62 179.2 -4.1C175.1 53.7 168.1 107.5 137.8 132.5C107.5 157.5 53.7 153.7 -3.4 157.2C-60.6 160.6 -121.2 171.2 -162.3 146.2C-203.5 121.2 -225.2 60.6 -223.6 1.6C-221.9 -57.3 -196.9 -114.6 -155.7 -164.6C-114.6 -214.6 -57.3 -257.3 2.4 -259.6C62 -262 124 -224 154.3 -174" fill="#BB004B"></path>
            </g>
            <!-- SVG (Blob) Two -->
            <g transform="translate(439.4708067536351 300.3150388148258)" style="visibility: hidden;">
              <path id="blob2" d="M168.8 -169C202.8 -134.8 203.4 -67.4 194 -9.4C184.6 48.6 165.1 97.1 131.1 136.9C97.1 176.8 48.6 207.9 2.1 205.8C-44.3 203.6 -88.6 168.3 -113.6 128.5C-138.6 88.6 -144.3 44.3 -157.5 -13.2C-170.7 -70.7 -191.4 -141.4 -166.4 -175.6C-141.4 -209.8 -70.7 -207.4 -1.6 -205.7C67.4 -204.1 134.8 -203.2 168.8 -169" fill="#BB004B"></path>
            </g>
          </svg>
            <!-- Tween Animation -->
            <script>
                KUTE.fromTo('#blob1', { path: '#blob1' }, { path: '#blob2' }, { repeat: 999, duration: 3000, yoyo: true }).start();
            </script>
        </div>

        <h1 class="hover:text-mod-dark-orange text-4xl md:text-6xl font-bold w-fit h-fit">
          Teddy's Website
        </h1>
        <p class="hover:text-mod-dark-orange text-xl md:text-3xl font-bold w-fit h-fit">
          Where creativity meets innovation
        </p>
      </div>

    </section>

    <!-- Waves Intersection  -->
    <img src="images/waves.svg" alt="waves" class="z-[-100] bg-cover bg-no-repeat w-full"/>

    <!-- Second Section -->
    <section class="w-full h-screen bg-mod-orange">


    </section>

  </body>
</html>
